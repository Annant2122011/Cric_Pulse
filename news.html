<!DOCTYPE html>
<html lang="en">
<head><link rel="stylesheet" href="style.css"><title>News | Cric Pulse</title></head>
<body>
    <nav class="navbar"> <div class="logo">CRIC<span>PULSE</span></div> </nav>
    <div class="container">
        <h1 style="color:var(--gold); margin-bottom:20px;">Top Headlines</h1>
        <div class="news-grid-3x3">
            <div class="card" onclick="openNews('India vs Eng', 'A blockbuster semi-final awaits at Wankhede...', 'https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?auto=format&fit=crop&w=600')">
                <div class="news-img-container"><img src="https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?auto=format&fit=crop&w=600"></div>
                <h4>India vs England SF</h4>
                <p>The stage is set for a massive clash...</p>
            </div>
        </div>
    </div>
    <div id="newsModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeNews()">&times;</span>
            <img id="modal-img" src="" style="width:100%; border-radius:10px;">
            <h2 id="modal-title" style="margin:15px 0;"></h2>
            <p id="modal-desc"></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
