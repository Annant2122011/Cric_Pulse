<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CricPulse | T20 World Cup 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

   <nav class="navbar">
        <div class="logo">CRIC<span>PULSE</span></div>
        <ul class="nav-links">
           
            <li><a href="news.html">NEWS</a></li>
            <li><a href="matches.html">MATCHES</a></li>
            <li><a href="live.html">LIVE</a></li>
            <li><a href="standings.html">STANDINGS</a></li>
        </ul>
    </nav>

    <section class="hero-section">
        <div class="container">
            <p class="venue-tag">📍 Narendra Modi Stadium, Ahmedabad</p>
            <h1>T20 WORLD CUP <span class="gold-text">2026</span></h1>
            <p class="hero-subtext">The road to glory ends here. Secure your spot for the Grand Final on March 8th.</p>

            <div class="countdown-boxes">
                <div class="c-box">

                <div class="c-box">
                    <span id="hours">17</span>

                <div class="c-box">
                    <span id="minutes">53</span>
                    <p>MIN</p>
                </div>
                <div class="c-box">
                    <span id="seconds">15</span>
                    <p>SEC</p>
                </div>
            </div>

            <div class="hero-btns">
                <a href="#" class="btn-primary">BUY TICKETS NOW</a>
                <a href="#" class="btn-secondary">MATCH CENTER</a>
            </div>
        </div>

    <script src="script.js"></script>
