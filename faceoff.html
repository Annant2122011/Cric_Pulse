    <div class="container">
        <h1 style="text-align: center; margin-top: 30px; color: var(--gold);">The Big Semi-Final Battles</h1>
        <p style="text-align: center; opacity: 0.7;">Comparing the Key Players for IND vs ENG</p>

        <div class="battle-card">
            <div class="player ind">

            <div class="player eng">

                <span class="stat-val">158.2</span><small>S/R</small>
            </div>
        </div>

        <div class="battle-card">
            <div class="player ind">
                <img src="https://images.unsplash.com/photo-1504450758481-7338eba7524a?w=300&h=300&fit=crop" alt="SKY">

            </div>
            <div class="vs-circle">VS</div>
            <div class="player eng">

                <span class="stat-val">12</span><small>WICKETS</small>
            </div>
            <div class="vs-circle">VS</div>
            <div class="player eng">
                <img src="https://images.unsplash.com/photo-1593341646782-e0b495cff86d?w=300&h=300&fit=crop" alt="Archer">
                <h3>Jofra Archer</h3>
