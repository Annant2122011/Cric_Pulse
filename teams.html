<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teams | Cric Pulse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1 style="color: var(--gold); margin-top: 40px; text-transform: uppercase;">Participating Nations</h1>
        <p style="opacity: 0.6; margin-bottom: 30px;">The Road to Ahmedabad: 20 Teams, 1 Trophy.</p>

        <h2 class="group-header">🔥 Super 8 Qualifiers</h2>
        <div class="teams-grid">
            <div class="team-card">
                <img src="https://flagcdn.com/w160/in.png" alt="India">
                <span>India</span>
            </div>
            <div class="team-card">
                <img src="https://flagcdn.com/w160/gb-eng.png" alt="England">
                <span>England</span>
            </div>
            <div class="team-card">
                <img src="https://flagcdn.com/w160/za.png" alt="South Africa">
                <span>South Africa</span>
            </div>
            <div class="team-card">
                <img src="https://flagcdn.com/w160/nz.png" alt="New Zealand">
                <span>New Zealand</span>
            </div>
            <div class="team-card">
                <img src="https://flagcdn.com/w160/au.png" alt="Australia">
                <span>Australia</span>
            </div>
            <div class="team-card">
                <img src="https://flagcdn.com/w160/af.png" alt="Afghanistan">
                <span>Afghanistan</span>
            </div>
            <div class="team-card">
                <img src="https://flagcdn.com/w160/wi.png" alt="West Indies">
                <span>West Indies</span>
            </div>
            <div class="team-card">
                <img src="https://flagcdn.com/w160/lk.png" alt="Sri Lanka">
                <span>Sri Lanka</span>
            </div>
        </div>

        <h2 class="group-header" style="margin-top: 50px; opacity: 0.5;">Other Nations</h2>
        <div class="teams-grid small-grid">
            <div class="team-card mini"><span>Pakistan</span></div>
            <div class="team-card mini"><span>USA</span></div>
            <div class="team-card mini"><span>Ireland</span></div>
            <div class="team-card mini"><span>Italy</span></div>
            <div class="team-card mini"><span>Netherlands</span></div>
            <div class="team-card mini"><span>Bangladesh</span></div>
            <div class="team-card mini"><span>Namibia</span></div>
            <div class="team-card mini"><span>Scotland</span></div>
            <div class="team-card mini"><span>Nepal</span></div>
            <div class="team-card mini"><span>Oman</span></div>
            <div class="team-card mini"><span>PNG</span></div>
            <div class="team-card mini"><span>Uganda</span></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
